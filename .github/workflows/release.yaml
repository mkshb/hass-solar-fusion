name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  hacs-validate:
    uses: ./.github/workflows/hacs-validate.yaml

  hassfest:
    uses: ./.github/workflows/hassfest.yaml

  release:
    name: Create GitHub release
    needs: [hacs-validate, hassfest]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
